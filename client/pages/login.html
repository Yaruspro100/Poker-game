<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Техасский Холдем</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>
    <header>
        <h1>
            <a href="/menu">Техасский Холдем</a>
        </h1>
    </header>

    <main>
        <div class="auth-container">
            <h2>Вход в аккаунт</h2>
            <form id="login-form" action="/api/login" method="POST">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" placeholder="Введите логин" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
                </div>
                <div id="login-error" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn-auth">Войти</button>
            </form>
            <div class="auth-links">
                <a href="/registration">Нет аккаунта? Зарегистрироваться</a>
            </div>
        </div>
    </main>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
