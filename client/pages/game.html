<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покерный стол - Техасский Холдем</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/game.css">
</head>
<body class="game-page">

    <header>
        <h1><a href="#">Техасский Холдем</a></h1>
        <div class="game-header-info">
            <span id="room-name-display">—</span>
            <span id="blinds-display">—</span>
        </div>
        <nav class="profile-nav"><ul></ul></nav>
    </header>

    <main class="game-main">

        <div class="table-wrapper">
            <div class="poker-table" id="poker-table">

                <div class="seat seat-pos-0" id="seat-0" data-seat="0"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-1" id="seat-1" data-seat="1"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-2" id="seat-2" data-seat="2"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-3" id="seat-3" data-seat="3"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-4" id="seat-4" data-seat="4"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-5" id="seat-5" data-seat="5"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-6" id="seat-6" data-seat="6"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-7" id="seat-7" data-seat="7"><div class="seat-inner empty">Свободно</div></div>
                <div class="seat seat-pos-8" id="seat-8" data-seat="8"><div class="seat-inner empty">Свободно</div></div>

                <div class="table-center">
                    <div class="phase-badge" id="phase-badge">Ожидание</div>

                    <div class="community-cards" id="community-cards">
                        <div class="card-slot" id="comm-0"></div>
                        <div class="card-slot" id="comm-1"></div>
                        <div class="card-slot" id="comm-2"></div>
                        <div class="card-slot" id="comm-3"></div>
                        <div class="card-slot" id="comm-4"></div>
                    </div>

                    <div class="pot-display">
                        <span class="pot-label">Банк:</span>
                        <span class="pot-amount" id="pot-amount">0 🪙</span>
                    </div>

                    <div class="side-pots" id="side-pots"></div>
                </div>

            </div>
        </div>

        <div class="player-panel">

            <div class="hole-cards-area">
                <div class="hole-card" id="hole-card-0"></div>
                <div class="hole-card" id="hole-card-1"></div>
                <div class="hand-name" id="hand-name"></div>
            </div>

            <div class="action-panel" id="action-panel">
                <div class="action-info">
                    <span id="action-prompt">Ожидайте своего хода...</span>
                    <span class="to-call-display" id="to-call-display"></span>
                </div>

                <div class="raise-section" id="raise-section">
                    <div class="raise-presets">
                        <button class="btn-raise-preset" data-mult="2">×2 BB</button>
                        <button class="btn-raise-preset" data-mult="3">×3 BB</button>
                        <button class="btn-raise-preset" data-mult="4">×4 BB</button>
                        <button class="btn-raise-preset" data-mult="pot">Пот</button>
                    </div>
                    <div class="raise-input-row">
                        <input type="range" id="raise-slider" min="0" max="1000" value="0">
                        <input type="number" id="raise-input" min="0" placeholder="Сумма">
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-fold"  id="btn-fold"  disabled>Сбросить</button>
                    <button class="btn-action btn-check" id="btn-check" disabled>Чек</button>
                    <button class="btn-action btn-call"  id="btn-call"  disabled>Колл</button>
                    <button class="btn-action btn-raise" id="btn-raise" disabled>Рейз</button>
                    <button class="btn-action btn-allin" id="btn-allin" disabled>Ва-банк</button>
                </div>
                <button type="button" class="btn-leave-table" id="btn-leave-table">Выйти из-за стола</button>
            </div>

        </div>
    </main>

    <aside class="result-banner hidden" id="overlay-result" aria-live="polite">
        <div class="result-banner-inner">
            <strong id="result-title">Результат раздачи</strong>
            <div id="result-body"></div>
        </div>
    </aside>

    <div class="overlay overlay-ready-layer hidden" id="overlay-ready">
        <div class="overlay-box">
            <h2>Следующая раздача</h2>
            <p class="ready-status" id="ready-status">Готовы: 0 из 0</p>
            <button type="button" class="btn-ready" id="btn-ready">Готов к раздаче</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/main-game.js"></script>
</body>
</html>
